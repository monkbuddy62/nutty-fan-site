<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PNUT SUX NUTS</title>
  <link rel="stylesheet" href="style.css?v=19">
</head>
<body>

<canvas id="stars"></canvas>
<canvas id="crosshairCanvas"></canvas>

<div id="gameArea"></div>

<div id="hud">
  <div id="hud-top">
    <div id="hud-title">◈ PNUT SUX NUTS ◈</div>
    <div id="hud-top-right">
      <span id="streak-display"></span>
      <button id="muteBtn" class="mute-btn" title="Toggle sound">🔊</button>
    </div>
  </div>

  <div id="hud-bottom">
    <div class="hud-cell">
      <div class="hud-lbl">KILLS</div>
      <div class="hud-val" id="scoreVal">000</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-cell">
      <div class="hud-lbl">TARGETS</div>
      <div class="hud-val" id="targetsVal">00</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-cell">
      <div class="hud-lbl">SPEED</div>
      <div class="hud-val" id="speedVal">0.0</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-cell">
      <div class="hud-lbl">WPNS</div>
      <div class="hud-val hud-armed">ARMED</div>
    </div>
  </div>
</div>

<div id="buildId">build 19</div>

<div id="loadingScreen">
  <div class="loading-inner">
    <div class="loading-title">PNUT SUX NUTS</div>
    <div class="loading-text" id="loadingText">Loading target data…</div>
  </div>
</div>

<script src="script.js?v=19"></script>
</body>
</html>
